{% extends 'base.html' %}

{% block title %}Liste des Produits{% endblock %}

{% block content %}
    <h1>Produits Disponibles</h1>
    <table class="table table-striped">
        <thead>
            <tr>
                <th>Nom</th>
                <th>Prix</th>
                <th>Stock</th>
                <th>Offre</th>
            </tr>
        </thead>
        <tbody>
            {% for product in products %}
            <tr>
                <td>{{ product.name }}</td>
                <td>{{ product.price }} €</td>
                <td>{{ product.stock }}</td>
                <td>{{ product.offre }}%</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
{% endblock %}
